<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>شبكتي - نسخة مبسطة تشبه فيسبوك</title>
  <meta name="description" content="تطبيق صفحة واحدة يشبه فيسبوك: منشورات، إعجابات، تعليقات، وضع داكن، حفظ محلي" />
  <meta name="theme-color" content="#0ea5e9" />
  <style>
    /*
      تصميم حديث، عربي (RTL)، وضع فاتح/داكن، بدون مكتبات خارجية
      كل شيء في ملف واحد كما طُلب
    */

    :root {
      --font-sans: ui-sans-serif, -apple-system, Segoe UI, Roboto, Noto Kufi Arabic, Noto Sans Arabic, Tahoma, Arial, "Apple Color Emoji", "Segoe UI Emoji";

      /* ألوان الوضع الفاتح */
      --bg: #f3f5f7;
      --bg-soft: #eef1f4;
      --card: #ffffff;
      --text: #0f172a; /* slate-900 */
      --text-muted: #64748b; /* slate-500 */
      --border: #e2e8f0; /* slate-200 */
      --accent: #0ea5e9; /* sky-500 */
      --accent-strong: #0284c7; /* sky-600 */
      --good: #16a34a; /* green-600 */
      --warn: #ea580c; /* orange-600 */
      --danger: #dc2626; /* red-600 */
      --shadow: 0 10px 30px rgba(2, 8, 23, 0.08);
      --shadow-soft: 0 6px 20px rgba(2, 8, 23, 0.06);
      --ring: 0 0 0 3px rgba(14, 165, 233, 0.25);
    }

    html[data-theme="dark"] {
      --bg: #0b1220; /* slate-950 mix */
      --bg-soft: #0f172a; /* slate-900 */
      --card: #111827; /* gray-900 */
      --text: #e5e7eb; /* gray-200 */
      --text-muted: #94a3b8; /* slate-400 */
      --border: #1f2937; /* gray-800 */
      --accent: #38bdf8; /* sky-400 */
      --accent-strong: #0ea5e9; /* sky-500 */
      --shadow: 0 10px 30px rgba(2, 8, 23, 0.4);
      --shadow-soft: 0 6px 24px rgba(2, 8, 23, 0.5);
      --ring: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: linear-gradient(180deg, var(--bg-soft), var(--bg) 120px);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* رأس الصفحة */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: saturate(140%) blur(8px);
      background: linear-gradient(90deg, rgba(14,165,233,0.12), rgba(14,165,233,0.06)), var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.4px;
      font-size: 20px;
    }

    .brand-badge {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: grid; place-items: center;
      background: conic-gradient(from 210deg at 50% 50%, #0ea5e9, #22c55e, #eab308, #8b5cf6, #0ea5e9);
      color: #fff;
      box-shadow: 0 6px 16px rgba(14,165,233,0.35);
      font-size: 18px;
    }

    .search {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .search input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
    }

    .header-actions { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }

    .icon-btn {
      display: inline-grid; place-items: center;
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform .1s ease, background .2s ease, box-shadow .2s ease;
    }
    .icon-btn:hover { transform: translateY(-1px); }
    .icon-btn:active { transform: translateY(0); }

    /* تخطيط الصفحة */
    .app-shell {
      max-width: 1200px; margin: 18px auto; padding: 0 16px;
      display: grid; gap: 16px;
      grid-template-columns: 280px minmax(0, 1fr) 300px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .sidebar { position: sticky; top: 78px; display: grid; gap: 12px; }

    .nav-card { padding: 12px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 10px; cursor: pointer; }
    .nav-item:hover { background: var(--bg); }

    .rightbar { position: sticky; top: 78px; display: grid; gap: 12px; }
    .widget { padding: 14px; }
    .widget h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--text-muted); font-weight: 700; letter-spacing: .2px; }

    /* المؤلف (الصورة الرمزية) */
    .avatar {
      --size: 40px;
      width: var(--size); height: var(--size);
      border-radius: 50%; flex: 0 0 var(--size);
      display: grid; place-items: center;
      color: #fff; font-weight: 700;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.35);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* منشئ المنشورات */
    .composer { padding: 12px; display: grid; gap: 10px; }
    .composer-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; }
    .composer textarea {
      width: 100%; resize: vertical; min-height: 64px; max-height: 260px;
      padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      outline: none; transition: box-shadow .2s ease, background .2s ease, border-color .2s ease;
    }
    .composer textarea:focus { box-shadow: var(--ring); border-color: var(--accent); background: transparent; }

    .composer-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .composer-actions { display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 8px 12px; border-radius: 12px;
      cursor: pointer; transition: transform .1s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: var(--shadow-soft);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff; border: none;
      box-shadow: 0 8px 20px rgba(14,165,233,0.35);
    }
    .btn-primary[disabled] { opacity: .6; cursor: not-allowed; transform: none; }

    .preview {
      display: none; border-radius: 12px; overflow: hidden; border: 1px dashed var(--border);
      background: var(--bg);
    }
    .preview.visible { display: block; }
    .preview img { width: 100%; max-height: 420px; object-fit: cover; }

    /* المنشور */
    .post { padding: 12px; display: grid; gap: 10px; }
    .post-header { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px; }
    .post-meta { display: flex; flex-direction: column; line-height: 1.2; }
    .post-name { font-weight: 800; }
    .post-time { font-size: 12px; color: var(--text-muted); }
    .post-text { white-space: pre-wrap; line-height: 1.7; }

    .post-media { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .post-media img { width: 100%; max-height: 540px; object-fit: cover; display: block; }

    .post-stats { display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-size: 13px; }
    .post-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .post-action {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; border-radius: 12px;
      background: var(--bg); border: 1px solid var(--border);
      cursor: pointer; box-shadow: var(--shadow-soft);
    }
    .post-action:hover { filter: brightness(1.02); }
    .post-action.liked { background: rgba(22, 163, 74, 0.08); border-color: rgba(22, 163, 74, 0.25); color: var(--good); }

    .comments { display: grid; gap: 10px; }
    .comment { display: grid; grid-template-columns: auto 1fr; gap: 10px; }
    .comment-bubble {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 12px; line-height: 1.5;
    }
    .comment-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .comment-name { font-weight: 800; font-size: 13px; }
    .comment-time { color: var(--text-muted); font-size: 12px; }

    .comment-composer { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; }
    .comment-input { width: 100%; padding: 10px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg); outline: none; }
    .comment-input:focus { box-shadow: var(--ring); border-color: var(--accent); background: transparent; }

    /* ويدجت الملف الشخصي */
    .profile { display: grid; gap: 12px; }
    .profile-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center; }
    .profile h4 { margin: 0; }
    .profile small { color: var(--text-muted); }
    .profile-edit { display: grid; gap: 8px; }
    .input {
      width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); outline: none;
    }
    .input:focus { box-shadow: var(--ring); border-color: var(--accent); background: transparent; }

    /* أصدقاء/اتصالات */
    .contacts { display: grid; gap: 8px; }
    .contact { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 6px 4px; border-radius: 10px; }
    .contact:hover { background: var(--bg); }
    .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px var(--card); }

    /* شرائط القصص (بسيطة) */
    .stories { display: grid; grid-auto-flow: column; grid-auto-columns: 140px; gap: 10px; overflow-x: auto; padding: 10px; }
    .story { position: relative; height: 180px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: linear-gradient(135deg, #0ea5e9, #8b5cf6); color: #fff; display: grid; place-items: end; padding: 10px; font-weight: 700; }
    .story::after { content: ""; position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,.35)); }

    /* تجاوبية */
    @media (max-width: 1100px) {
      .app-shell { grid-template-columns: 220px minmax(0,1fr) 280px; }
    }
    @media (max-width: 980px) {
      .app-shell { grid-template-columns: minmax(0,1fr); }
      .sidebar, .rightbar { position: static; }
    }

    /* أيقونات عامة */
    .icon { width: 18px; height: 18px; }
    .icon-lg { width: 20px; height: 20px; }

    /* مخفي بصريًا لمحاذاة النصوص الطويلة بشكل جميل */
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-badge" aria-hidden="true">ش</div>
        <div>شبكتي</div>
      </div>
      <label class="search" aria-label="بحث">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg>
        <input id="searchInput" type="search" placeholder="ابحث في شبكتي..." />
      </label>
      <div class="header-actions">
        <button id="themeToggle" class="icon-btn" title="تبديل الوضع">
          <svg id="themeIcon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 12 21.75c-5.385 0-9.75-4.365-9.75-9.75 0-4.28 2.686-7.932 6.45-9.26a.75.75 0 0 1 .964.966A7.501 7.501 0 0 0 19.5 12c0 1.105-.224 2.156-.626 3.113a.75.75 0 0 0 .878.889z"/></svg>
        </button>
        <button id="openProfileEdit" class="icon-btn" title="الملف الشخصي">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0 1 15 0"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-shell" id="appRoot" aria-live="polite">
    <!-- الشريط الجانبي الأيسر -->
    <aside class="sidebar">
      <nav class="nav-card card" aria-label="التنقل">
        <div class="nav-item">
          <div class="avatar" style="--size:32px" id="sidebarAvatar"><span id="sidebarAvatarText">أ</span></div>
          <div class="truncate" id="sidebarName">اسم المستخدم</div>
        </div>
        <a class="nav-item" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m10-11l2 2m-2-2v10a1 1 0 0 1-1 1h-3m-6 0h6"/></svg>
          <span>الرئيسية</span>
        </a>
        <a class="nav-item" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20 8a8 8 0 1 1-16 0 8 8 0 0 1 16 0z"/></svg>
          <span>الاستكشاف</span>
        </a>
        <a class="nav-item" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16 12H8m0 0l4-4m-4 4l4 4M4 6h16"/></svg>
          <span>الذكريات</span>
        </a>
      </nav>

      <section class="card widget">
        <h3>قصص سريعة</h3>
        <div class="stories" id="stories"></div>
      </section>
    </aside>

    <!-- المحتوى الرئيسي -->
    <section class="main">
      <article class="card composer" aria-label="اكتب منشورًا">
        <div class="composer-row">
          <div class="avatar" id="composerAvatar"><span id="composerAvatarText">أ</span></div>
          <textarea id="postText" placeholder="بم تفكر؟"></textarea>
        </div>
        <div class="preview" id="imagePreview">
          <img id="previewImg" alt="معاينة الصورة" />
        </div>
        <div class="composer-toolbar">
          <div class="composer-actions">
            <label class="btn" title="إضافة صورة">
              <input id="imageInput" type="file" accept="image/*" hidden />
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2M3 17v2a2 2 0 0 0 2 2h2m10 0h2a2 2 0 0 0 2-2v-2M8 12l3 3 5-6 4 5M3 16l4-4 2 2"/></svg>
              <span>صورة</span>
            </label>
            <button id="clearImage" class="btn" type="button" title="إزالة الصورة" style="display:none">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              <span>إزالة</span>
            </button>
          </div>
          <div>
            <button id="publishBtn" class="btn btn-primary" disabled>
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 1 0 15 0 7.5 7.5 0 0 0-15 0zm7.5-4.5V12l3 3"/></svg>
              <span>نشر</span>
            </button>
          </div>
        </div>
      </article>

      <section id="feed" aria-live="polite" style="display:grid; gap:12px; margin-top:12px;"></section>
    </section>

    <!-- الشريط الجانبي الأيمن -->
    <aside class="rightbar">
      <section class="card widget">
        <h3>الملف الشخصي</h3>
        <div class="profile" id="profileWidget">
          <div class="profile-row">
            <div class="avatar" style="--size:48px" id="profileAvatar"><span id="profileAvatarText">أ</span></div>
            <div>
              <h4 id="profileName" class="truncate">اسم المستخدم</h4>
              <small id="profileHint">انقر للتعديل من أعلى الصفحة</small>
            </div>
          </div>
          <div class="profile-edit" id="profileEdit" hidden>
            <input id="nameInput" class="input" placeholder="اكتب اسمك" />
            <label class="btn" style="justify-content:center">
              <input id="avatarInput" type="file" accept="image/*" hidden />
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
              <span>تغيير الصورة</span>
            </label>
            <button id="saveProfile" class="btn btn-primary" type="button">حفظ</button>
          </div>
        </div>
      </section>

      <section class="card widget">
        <h3>جهات الاتصال</h3>
        <div class="contacts" id="contacts"></div>
      </section>

      <section class="card widget">
        <h3>الشائع الآن</h3>
        <div id="trending" style="display:grid; gap:8px;"></div>
      </section>
    </aside>
  </main>

  <template id="postTemplate">
    <article class="card post" data-post-id="">
      <div class="post-header">
        <div class="avatar"><img alt="" /></div>
        <div class="post-meta">
          <div class="post-name"></div>
          <div class="post-time"></div>
        </div>
        <button class="icon-btn" title="المزيد">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="6" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="18" r="1.6"/></svg>
        </button>
      </div>
      <div class="post-text"></div>
      <div class="post-media" hidden><img alt="" /></div>
      <div class="post-stats"><span class="likes-count">0 إعجاب</span> • <span class="comments-count">0 تعليق</span></div>
      <div class="post-actions">
        <button class="post-action like-action" type="button">
          <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M14 9l-2-6-2 6m6 0h-8l-1 8h10l-1-8z"/></svg>
          <span>أعجبني</span>
        </button>
        <button class="post-action comment-toggle" type="button">
          <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8z"/></svg>
          <span>تعليق</span>
        </button>
        <button class="post-action share-action" type="button">
          <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 12h10M7 17h6M14 7h3m-3 0l-2-2m2 2l-2 2"/></svg>
          <span>مشاركة</span>
        </button>
      </div>
      <div class="comments" hidden>
        <div class="comment-list" style="display:grid; gap:10px;"></div>
        <div class="comment-composer">
          <div class="avatar" style="--size:32px"><img alt="" /></div>
          <input class="comment-input" type="text" placeholder="اكتب تعليقًا..." />
          <button class="btn btn-primary send-comment" type="button">إرسال</button>
        </div>
      </div>
    </article>
  </template>

  <template id="commentTemplate">
    <div class="comment">
      <div class="avatar" style="--size:32px"><img alt="" /></div>
      <div class="comment-bubble">
        <div class="comment-meta"><span class="comment-name"></span><span class="comment-time"></span></div>
        <div class="comment-text"></div>
      </div>
    </div>
  </template>

  <script>
    // ===============
    // نموذج البيانات
    // ===============
    const APP_STORAGE_KEY = 'shabkati_app_v1';

    /**
     * @typedef {Object} UserProfile
     * @property {string} name
     * @property {string|null} avatarDataUrl
     */

    /**
     * @typedef {Object} Comment
     * @property {string} id
     * @property {string} authorName
     * @property {string|null} authorAvatar
     * @property {string} text
     * @property {number} createdAt
     */

    /**
     * @typedef {Object} Post
     * @property {string} id
     * @property {string} authorName
     * @property {string|null} authorAvatar
     * @property {string} contentText
     * @property {string|null} imageDataUrl
     * @property {number} createdAt
     * @property {number} likesCount
     * @property {boolean} liked
     * @property {Comment[]} comments
     */

    /**
     * @typedef {Object} AppState
     * @property {"light"|"dark"} theme
     * @property {UserProfile} userProfile
     * @property {Post[]} posts
     */

    /** @type {AppState} */
    let state = {
      theme: 'light',
      userProfile: { name: 'ضيف', avatarDataUrl: null },
      posts: []
    };

    // ===============
    // أدوات مساعدة
    // ===============

    function saveState() {
      try {
        localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.warn('تعذر الحفظ في localStorage', err);
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(APP_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state = Object.assign(state, parsed);
        }
      } catch (err) {
        console.warn('تعذر القراءة من localStorage', err);
      }
    }

    function generateId(prefix) {
      return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function isBlank(value) {
      return !value || !String(value).trim();
    }

    function formatTimeAgo(ts) {
      const now = Date.now();
      const diff = Math.max(0, Math.floor((now - ts) / 1000));
      if (diff < 10) return 'الآن';
      if (diff < 60) return `منذ ${diff} ثوانٍ`;
      const minutes = Math.floor(diff / 60);
      if (minutes < 60) return minutes === 1 ? 'منذ دقيقة' : minutes < 3 ? 'منذ دقيقتين' : `منذ ${minutes} دقائق`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours === 1 ? 'منذ ساعة' : hours < 3 ? 'منذ ساعتين' : `منذ ${hours} ساعات`;
      const days = Math.floor(hours / 24);
      if (days === 1) return 'أمس';
      if (days < 7) return `منذ ${days} أيام`;
      const weeks = Math.floor(days / 7);
      if (weeks < 5) return weeks === 1 ? 'منذ أسبوع' : weeks < 3 ? 'منذ أسبوعين' : `منذ ${weeks} أسابيع`;
      const d = new Date(ts);
      return d.toLocaleDateString('ar');
    }

    function getInitials(name) {
      const parts = String(name || '').split(/\s+/).filter(Boolean);
      if (parts.length === 0) return '؟';
      const first = parts[0][0] || '';
      const second = parts.length > 1 ? parts[1][0] : '';
      return (first + second).toUpperCase();
    }

    function dataUrlFromFile(file, maxBytes = 4 * 1024 * 1024) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        if (file.size > maxBytes) {
          reject(new Error('حجم الصورة كبير. الرجاء اختيار صورة أصغر (≤ 4MB).'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('فشل تحميل الصورة'));
        reader.readAsDataURL(file);
      });
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      state.theme = theme;
      saveState();
      const themeIcon = document.getElementById('themeIcon');
      if (themeIcon) {
        themeIcon.innerHTML = theme === 'dark'
          ? '<path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 12 21.75c-5.385 0-9.75-4.365-9.75-9.75 0-4.28 2.686-7.932 6.45-9.26a.75.75 0 0 1 .964.966A7.501 7.501 0 0 0 19.5 12c0 1.105-.224 2.156-.626 3.113a.75.75 0 0 0 .878.889z"/>'
          : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25M18.364 5.636l-1.59 1.59M21 12h-2.25M18.364 18.364l-1.59-1.59M12 21v-2.25M7.226 16.774l-1.59 1.59M5.25 12H3M7.226 7.226l-1.59-1.59M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0z"/>';
      }
    }

    // ===============
    // واجهة المستخدم
    // ===============

    const els = {
      sidebarAvatar: document.getElementById('sidebarAvatar'),
      sidebarAvatarText: document.getElementById('sidebarAvatarText'),
      sidebarName: document.getElementById('sidebarName'),
      composerAvatar: document.getElementById('composerAvatar'),
      composerAvatarText: document.getElementById('composerAvatarText'),
      postText: document.getElementById('postText'),
      imageInput: document.getElementById('imageInput'),
      clearImage: document.getElementById('clearImage'),
      imagePreview: document.getElementById('imagePreview'),
      previewImg: document.getElementById('previewImg'),
      publishBtn: document.getElementById('publishBtn'),
      feed: document.getElementById('feed'),
      themeToggle: document.getElementById('themeToggle'),
      openProfileEdit: document.getElementById('openProfileEdit'),
      profileEdit: document.getElementById('profileEdit'),
      nameInput: document.getElementById('nameInput'),
      avatarInput: document.getElementById('avatarInput'),
      saveProfile: document.getElementById('saveProfile'),
      profileName: document.getElementById('profileName'),
      profileAvatar: document.getElementById('profileAvatar'),
      profileAvatarText: document.getElementById('profileAvatarText'),
      profileHint: document.getElementById('profileHint'),
      contacts: document.getElementById('contacts'),
      trending: document.getElementById('trending'),
      stories: document.getElementById('stories'),
      searchInput: document.getElementById('searchInput'),
    };

    function updateProfileUI() {
      const { name, avatarDataUrl } = state.userProfile;
      const initials = getInitials(name);

      els.sidebarName.textContent = name || 'ضيف';
      els.profileName.textContent = name || 'ضيف';
      els.nameInput.value = name || '';

      const applyAvatar = (container, fallbackSpanId) => {
        const img = container.querySelector('img');
        let span = container.querySelector('span');
        if (!span && fallbackSpanId) span = document.getElementById(fallbackSpanId);
        if (avatarDataUrl) {
          if (img) img.src = avatarDataUrl;
          if (span) span.style.display = 'none';
        } else {
          if (img) img.removeAttribute('src');
          if (span) {
            span.style.display = '';
            span.textContent = initials;
          }
        }
      };

      applyAvatar(els.sidebarAvatar, 'sidebarAvatarText');
      applyAvatar(els.composerAvatar, 'composerAvatarText');
      applyAvatar(els.profileAvatar, 'profileAvatarText');

      saveState();
    }

    function setPublishEnabled() {
      const hasText = !isBlank(els.postText.value);
      const hasImage = Boolean(els.previewImg.getAttribute('src'));
      els.publishBtn.disabled = !(hasText || hasImage);
    }

    function clearComposer() {
      els.postText.value = '';
      els.previewImg.removeAttribute('src');
      els.imagePreview.classList.remove('visible');
      els.clearImage.style.display = 'none';
      els.imageInput.value = '';
      setPublishEnabled();
    }

    function renderStories() {
      const sample = [
        { title: 'لحظة جميلة', color: ['#0ea5e9', '#8b5cf6'] },
        { title: 'رحلة سريعة', color: ['#22c55e', '#0ea5e9'] },
        { title: 'ذكريات', color: ['#f59e0b', '#ef4444'] },
        { title: 'إنجاز جديد', color: ['#8b5cf6', '#22c55e'] },
      ];
      els.stories.innerHTML = '';
      for (const s of sample) {
        const d = document.createElement('div');
        d.className = 'story';
        d.style.background = `linear-gradient(135deg, ${s.color[0]}, ${s.color[1]})`;
        d.innerHTML = `<span style="position:relative; z-index:1">${s.title}</span>`;
        els.stories.appendChild(d);
      }
    }

    function renderContacts() {
      const names = [
        'ليلى', 'سعيد', 'نور', 'أحمد', 'مها', 'سارة', 'عمر', 'ريم', 'نواف', 'حمد'
      ];
      els.contacts.innerHTML = '';
      names.forEach((n, i) => {
        const row = document.createElement('div');
        row.className = 'contact';
        row.innerHTML = `
          <div class="avatar" style="--size:28px"><span>${getInitials(n)}</span></div>
          <div class="truncate">${n}</div>
          <div class="online-dot" title="متصل الآن"></div>
        `;
        els.contacts.appendChild(row);
      });
    }

    function renderTrending() {
      const items = [
        { tag: '#تقنية', count: 1283 },
        { tag: '#كرة_القدم', count: 954 },
        { tag: '#تصميم', count: 612 },
        { tag: '#تعلم_ذاتي', count: 431 },
      ];
      els.trending.innerHTML = '';
      items.forEach((it) => {
        const a = document.createElement('a');
        a.className = 'btn';
        a.style.justifyContent = 'space-between';
        a.href = '#';
        a.innerHTML = `<span>${it.tag}</span><small style="color:var(--text-muted)">${it.count} منشور</small>`;
        els.trending.appendChild(a);
      });
    }

    function updateCounts(postEl, post) {
      const likesEl = postEl.querySelector('.likes-count');
      const commentsEl = postEl.querySelector('.comments-count');
      likesEl.textContent = `${post.likesCount} إعجاب`;
      commentsEl.textContent = `${post.comments.length} تعليق`;
    }

    function renderComment(comment) {
      const tpl = document.getElementById('commentTemplate');
      const el = tpl.content.firstElementChild.cloneNode(true);
      const img = el.querySelector('img');
      const nameEl = el.querySelector('.comment-name');
      const timeEl = el.querySelector('.comment-time');
      const textEl = el.querySelector('.comment-text');

      nameEl.textContent = comment.authorName;
      timeEl.textContent = formatTimeAgo(comment.createdAt);
      textEl.textContent = comment.text;

      if (comment.authorAvatar) {
        img.src = comment.authorAvatar;
      } else {
        img.remove();
        const av = el.querySelector('.avatar');
        av.innerHTML = `<span>${getInitials(comment.authorName)}</span>`;
      }

      return el;
    }

    function renderPost(post) {
      const tpl = document.getElementById('postTemplate');
      const postEl = tpl.content.firstElementChild.cloneNode(true);
      postEl.dataset.postId = post.id;

      // header
      const avatarImg = postEl.querySelector('.post-header .avatar img');
      const nameEl = postEl.querySelector('.post-name');
      const timeEl = postEl.querySelector('.post-time');
      if (post.authorAvatar) {
        avatarImg.src = post.authorAvatar;
      } else {
        avatarImg.remove();
        const av = postEl.querySelector('.post-header .avatar');
        av.innerHTML = `<span>${getInitials(post.authorName)}</span>`;
      }
      nameEl.textContent = post.authorName;
      timeEl.textContent = formatTimeAgo(post.createdAt);

      // text
      const textEl = postEl.querySelector('.post-text');
      if (!isBlank(post.contentText)) {
        textEl.textContent = post.contentText;
      } else {
        textEl.remove();
      }

      // media
      const mediaWrap = postEl.querySelector('.post-media');
      const mediaImg = mediaWrap.querySelector('img');
      if (post.imageDataUrl) {
        mediaImg.src = post.imageDataUrl;
        mediaWrap.hidden = false;
      } else {
        mediaWrap.hidden = true;
      }

      updateCounts(postEl, post);

      // actions
      const likeBtn = postEl.querySelector('.like-action');
      const commentToggle = postEl.querySelector('.comment-toggle');
      const shareBtn = postEl.querySelector('.share-action');

      if (post.liked) likeBtn.classList.add('liked');

      likeBtn.addEventListener('click', () => {
        post.liked = !post.liked;
        post.likesCount += post.liked ? 1 : -1;
        likeBtn.classList.toggle('liked', post.liked);
        updateCounts(postEl, post);
        saveState();
      });

      shareBtn.addEventListener('click', async () => {
        try {
          const shareData = {
            title: 'منشور من شبكتي',
            text: post.contentText || 'منشور من شبكتي',
          };
          if (navigator.share && typeof navigator.share === 'function') {
            await navigator.share(shareData);
          } else {
            await navigator.clipboard.writeText(shareData.text);
            alert('تم نسخ نص المنشور للمشاركة');
          }
        } catch (_) { /* ignore */ }
      });

      const commentsWrap = postEl.querySelector('.comments');
      const commentList = postEl.querySelector('.comment-list');
      const commentInput = postEl.querySelector('.comment-input');
      const sendComment = postEl.querySelector('.send-comment');

      // current user avatar in comment composer
      const composerAvatarImg = postEl.querySelector('.comment-composer .avatar img');
      if (state.userProfile.avatarDataUrl) {
        composerAvatarImg.src = state.userProfile.avatarDataUrl;
      } else {
        composerAvatarImg.remove();
        const av = postEl.querySelector('.comment-composer .avatar');
        av.innerHTML = `<span>${getInitials(state.userProfile.name)}</span>`;
      }

      function renderAllComments() {
        commentList.innerHTML = '';
        post.comments.forEach((c) => commentList.appendChild(renderComment(c)));
      }

      renderAllComments();

      commentToggle.addEventListener('click', () => {
        const visible = commentsWrap.hasAttribute('hidden') === false;
        commentsWrap.hidden = visible; // toggle
      });

      function submitComment() {
        const text = commentInput.value.trim();
        if (isBlank(text)) return;
        const newComment = {
          id: generateId('c'),
          authorName: state.userProfile.name || 'ضيف',
          authorAvatar: state.userProfile.avatarDataUrl,
          text,
          createdAt: Date.now(),
        };
        post.comments.push(newComment);
        commentInput.value = '';
        renderAllComments();
        updateCounts(postEl, post);
        saveState();
      }

      sendComment.addEventListener('click', submitComment);
      commentInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          submitComment();
        }
      });

      return postEl;
    }

    function renderFeed(filterText = '') {
      els.feed.innerHTML = '';
      const q = filterText.trim();
      const filtered = q ? state.posts.filter(p =>
        (p.contentText && p.contentText.includes(q)) || (p.authorName && p.authorName.includes(q))
      ) : state.posts;

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.style.padding = '24px';
        empty.style.textAlign = 'center';
        empty.innerHTML = 'لا توجد منشورات بعد. اكتب أول منشور لك!';
        els.feed.appendChild(empty);
        return;
      }

      filtered
        .slice()
        .sort((a, b) => b.createdAt - a.createdAt)
        .forEach(post => els.feed.appendChild(renderPost(post)));
    }

    function createSampleDataIfEmpty() {
      if (state.posts && state.posts.length > 0) return;
      const now = Date.now();
      state.posts = [
        {
          id: generateId('p'),
          authorName: 'شبكتي',
          authorAvatar: null,
          contentText: 'أهلًا بك! هذه نسخة مبسطة تشبه فيسبوك. جرّب كتابة منشور، أضف صورة، بدّل الوضع الداكن، وسيتم حفظ كل شيء تلقائيًا على جهازك.',
          imageDataUrl: null,
          createdAt: now - 1000 * 60 * 30,
          likesCount: 12,
          liked: false,
          comments: [
            { id: generateId('c'), authorName: 'سارة', authorAvatar: null, text: 'فكرة جميلة 👏', createdAt: now - 1000 * 60 * 25 },
            { id: generateId('c'), authorName: 'أحمد', authorAvatar: null, text: 'أبدعتوا في التصميم!', createdAt: now - 1000 * 60 * 10 },
          ]
        },
        {
          id: generateId('p'),
          authorName: 'نور',
          authorAvatar: null,
          contentText: 'لقطة من رحلتي الأخيرة 🌅',
          imageDataUrl: null,
          createdAt: now - 1000 * 60 * 60 * 5,
          likesCount: 5,
          liked: false,
          comments: []
        }
      ];
    }

    function updateAllProfilePlaceholders() {
      updateProfileUI();
      renderFeed(els.searchInput.value || '');
    }

    // ===============
    // الأحداث العامة
    // ===============
    function attachGlobalEvents() {
      els.postText.addEventListener('input', setPublishEnabled);

      els.imageInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await dataUrlFromFile(file);
          els.previewImg.src = dataUrl;
          els.imagePreview.classList.add('visible');
          els.clearImage.style.display = '';
          setPublishEnabled();
        } catch (err) {
          alert(err.message || 'تعذر إضافة الصورة');
        }
      });

      els.clearImage.addEventListener('click', () => {
        els.previewImg.removeAttribute('src');
        els.imagePreview.classList.remove('visible');
        els.clearImage.style.display = 'none';
        els.imageInput.value = '';
        setPublishEnabled();
      });

      els.publishBtn.addEventListener('click', () => {
        const text = (els.postText.value || '').trim();
        const imageDataUrl = els.previewImg.getAttribute('src') || null;
        if (isBlank(text) && !imageDataUrl) return;

        const newPost = {
          id: generateId('p'),
          authorName: state.userProfile.name || 'ضيف',
          authorAvatar: state.userProfile.avatarDataUrl,
          contentText: text,
          imageDataUrl,
          createdAt: Date.now(),
          likesCount: 0,
          liked: false,
          comments: [],
        };

        state.posts.push(newPost);
        saveState();
        clearComposer();
        renderFeed(els.searchInput.value || '');
      });

      els.themeToggle.addEventListener('click', () => {
        setTheme(state.theme === 'dark' ? 'light' : 'dark');
      });

      els.openProfileEdit.addEventListener('click', () => {
        const isHidden = els.profileEdit.hasAttribute('hidden');
        els.profileEdit.hidden = !isHidden;
        if (!isHidden) {
          // closing -> save if name changed
          const newName = els.nameInput.value.trim();
          if (!isBlank(newName) && newName !== state.userProfile.name) {
            state.userProfile.name = newName;
            saveState();
            updateAllProfilePlaceholders();
          }
        } else {
          els.nameInput.focus();
        }
      });

      els.saveProfile.addEventListener('click', () => {
        const newName = els.nameInput.value.trim();
        if (!isBlank(newName)) {
          state.userProfile.name = newName;
        }
        els.profileEdit.hidden = true;
        saveState();
        updateAllProfilePlaceholders();
      });

      els.avatarInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await dataUrlFromFile(file);
          state.userProfile.avatarDataUrl = dataUrl;
          saveState();
          updateAllProfilePlaceholders();
        } catch (err) {
          alert(err.message || 'تعذر تحميل الصورة');
        }
      });

      els.searchInput.addEventListener('input', () => {
        renderFeed(els.searchInput.value || '');
      });
    }

    // ===============
    // بدء التشغيل
    // ===============
    (function bootstrap() {
      loadState();

      // theme
      if (state.theme === 'dark') setTheme('dark');
      else {
        // إذا لم تُحفظ تفضيلات، استخدم تفضيل النظام
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark ? 'dark' : 'light');
      }

      // user profile
      if (!state.userProfile || typeof state.userProfile !== 'object') {
        state.userProfile = { name: 'ضيف', avatarDataUrl: null };
      }

      // sample content if empty
      createSampleDataIfEmpty();

      // UI blocks
      renderStories();
      renderContacts();
      renderTrending();
      updateProfileUI();
      renderFeed();

      // events
      attachGlobalEvents();

      // إمكانية مشاركة سريعة عبر Ctrl+Enter من محرر المنشور
      els.postText.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          if (!els.publishBtn.disabled) {
            els.publishBtn.click();
          }
        }
      });

      // تفعيل/تعطيل زر النشر حسب المحتوى الأولي
      setPublishEnabled();

      // تحديث الأوقات كل دقيقة
      setInterval(() => {
        document.querySelectorAll('.post').forEach((postEl) => {
          const id = postEl.dataset.postId;
          const post = state.posts.find(p => p.id === id);
          if (!post) return;
          const timeEl = postEl.querySelector('.post-time');
          if (timeEl) timeEl.textContent = formatTimeAgo(post.createdAt);
        });
        document.querySelectorAll('.comment').forEach((cEl) => {
          // لا نحفظ معرفات التعليق في DOM لنبقيه بسيطًا؛ تجاهُل تحديث أوقات التعليقات هنا لتقليل التعقيد
        });
      }, 60 * 1000);
    })();
  </script>
</body>
</html>
