<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>شبكة اجتماعية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; /* slate-900 */
      --bg-elev: #111827; /* gray-900 */
      --card: #0b1220; /* slightly darker */
      --text: #e5e7eb; /* gray-200 */
      --text-dim: #9ca3af; /* gray-400 */
      --primary: #2563eb; /* blue-600 */
      --primary-2: #1d4ed8; /* blue-700 */
      --accent: #22d3ee; /* cyan-400 */
      --danger: #ef4444; /* red-500 */
      --success: #22c55e; /* green-500 */
      --border: #1f2937; /* gray-800 */
      --muted: #0b1324;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }
    [data-theme="light"] {
      --bg: #f3f4f6;
      --bg-elev: #ffffff;
      --card: #ffffff;
      --text: #0f172a;
      --text-dim: #475569;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --accent: #06b6d4;
      --danger: #ef4444;
      --success: #16a34a;
      --border: #e5e7eb;
      --muted: #f1f5f9;
      --shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Tajawal', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #0b1020 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    .app-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100dvh;
    }

    /* Top Nav */
    .topnav {
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: saturate(1.2) blur(10px);
      background: linear-gradient(180deg, rgba(17,24,39,0.85), rgba(17,24,39,0.65));
      border-bottom: 1px solid var(--border);
    }
    .topnav-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 240px 1fr 240px; gap: 16px;
      align-items: center; padding: 12px 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: radial-gradient(120% 120% at 20% 20%, var(--accent), var(--primary));
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
    }
    .brand-name { font-weight: 900; letter-spacing: -0.3px; }

    .search {
      position: relative; display: flex; align-items: center;
      background: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; overflow: hidden;
    }
    .search input {
      width: 100%; padding: 12px 44px 12px 14px; background: transparent; border: none; outline: none; color: var(--text);
    }
    .search .icon { position: absolute; right: 10px; color: var(--text-dim); }

    .actions { display: flex; justify-content: end; gap: 10px; align-items: center; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--border);
      display: grid; place-items: center; background: var(--bg-elev); color: var(--text);
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    .icon-btn:hover { transform: translateY(-1px); border-color: var(--primary); }

    /* Layout */
    .layout {
      max-width: 1200px; margin: 18px auto; padding: 0 16px; gap: 16px;
      display: grid; grid-template-columns: 280px 1fr 300px;
    }

    /* Sidebars */
    .sidebar { position: sticky; top: 72px; align-self: start; display: grid; gap: 12px; }
    .card {
      background: linear-gradient(180deg, var(--card), rgba(16,24,40,0.92));
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card .card-head { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 700; }
    .card .card-body { padding: 12px 14px; display: grid; gap: 10px; }

    .nav-list, .contact-list { list-style: none; margin: 0; padding: 0; }
    .nav-item, .contact-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; }
    .nav-item:hover, .contact-item:hover { background: rgba(37, 99, 235, 0.08); }
    .avatar { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, #334155, #1f2937); display: grid; place-items: center; font-weight: 800; color: #cbd5e1; }

    /* Composer */
    .composer { display: grid; gap: 10px; padding: 12px; }
    .composer .row { display: flex; gap: 10px; align-items: center; }
    .composer textarea {
      width: 100%; min-height: 64px; resize: vertical; border-radius: 12px; padding: 10px;
      border: 1px solid var(--border); background: var(--bg-elev); color: var(--text);
    }
    .cta-bar { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .chip {
      padding: 8px 12px; border-radius: 999px; border: 1px dashed var(--border); background: var(--bg-elev); color: var(--text-dim);
    }
    .btn {
      padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--primary), var(--primary-2)); color: white; font-weight: 700;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35); cursor: pointer;
      transition: transform .12s ease, box-shadow .2s ease;
    }
    .btn:disabled { filter: grayscale(100%); opacity: .6; cursor: not-allowed; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.45); }

    /* Feed */
    .feed { display: grid; gap: 12px; }
    .post { display: grid; gap: 8px; padding: 12px; }
    .post-head { display: flex; gap: 10px; align-items: center; }
    .post-author { font-weight: 800; }
    .post-time { color: var(--text-dim); font-size: 13px; }
    .post-content { line-height: 1.8; font-size: 15px; white-space: pre-wrap; }
    .post-media img { width: 100%; border-radius: 12px; border: 1px solid var(--border); }

    .post-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .post-cta { display: flex; gap: 8px; }
    .pill {
      display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px;
      background: var(--bg-elev); border: 1px solid var(--border); cursor: pointer; color: var(--text);
    }
    .pill.active { border-color: var(--primary); background: linear-gradient(180deg, rgba(37,99,235,0.12), rgba(37,99,235,0.06)); }

    .comment-box { display: grid; gap: 8px; }
    .comment { display: grid; gap: 6px; padding: 10px; border-radius: 12px; background: var(--bg-elev); border: 1px solid var(--border); }
    .comment .meta { display: flex; gap: 8px; align-items: baseline; }
    .comment .author { font-weight: 700; }
    .comment .time { color: var(--text-dim); font-size: 12px; }

    /* Empty */
    .empty { display: grid; place-items: center; padding: 26px; color: var(--text-dim); }

    /* Footer */
    .footer { text-align: center; color: var(--text-dim); padding: 32px 0; }

    /* Responsive */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 240px 1fr 260px; }
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar.left, .sidebar.right { position: static; }
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell" data-theme="dark">
    <!-- Top Navigation -->
    <nav class="topnav">
      <div class="topnav-inner">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true"></div>
          <div class="brand-name">Nebula</div>
        </div>
        <label class="search">
          <input type="search" id="searchInput" placeholder="ابحث في المشاركات، الأصدقاء..." />
          <span class="icon">🔎</span>
        </label>
        <div class="actions">
          <button id="themeBtn" class="icon-btn" title="تبديل المظهر">🌓</button>
          <button id="resetBtn" class="icon-btn" title="إعادة تعيين البيانات">♻️</button>
          <div id="meAvatar" class="avatar" title="ملفي">أ</div>
        </div>
      </div>
    </nav>

    <!-- Main Layout -->
    <main class="layout">
      <!-- Left Sidebar -->
      <aside class="sidebar left">
        <div class="card">
          <div class="card-head">التنقل</div>
          <div class="card-body">
            <ul class="nav-list">
              <li class="nav-item">🏠 <a href="#">الصفحة الرئيسية</a></li>
              <li class="nav-item">👥 <a href="#">الأصدقاء</a></li>
              <li class="nav-item">🎬 <a href="#">الفيديوهات</a></li>
              <li class="nav-item">📰 <a href="#">الأخبار</a></li>
              <li class="nav-item">⚙️ <a href="#">الإعدادات</a></li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="card-head">القصص</div>
          <div class="card-body" id="stories"></div>
        </div>
      </aside>

      <!-- Feed Column -->
      <section>
        <div class="card">
          <div class="composer">
            <div class="row">
              <div class="avatar" id="composerAvatar">أ</div>
              <textarea id="composerText" placeholder="بم تفكر؟ اكتب شيئًا ملهمًا…"></textarea>
            </div>
            <div class="cta-bar">
              <div class="row" style="gap:8px">
                <span class="chip">📷 صورة</span>
                <span class="chip">🎥 بث مباشر</span>
                <span class="chip">😊 حالة</span>
              </div>
              <button id="publishBtn" class="btn" disabled>نشر</button>
            </div>
          </div>
        </div>

        <div class="feed" id="feed"></div>
        <div class="empty" id="emptyFeed" hidden>لا توجد منشورات بعد. اكتب أول منشور لك! ✨</div>
      </section>

      <!-- Right Sidebar -->
      <aside class="sidebar right">
        <div class="card">
          <div class="card-head">الأحداث الجارية</div>
          <div class="card-body" id="trends"></div>
        </div>

        <div class="card">
          <div class="card-head">جهات الاتصال</div>
          <div class="card-body">
            <ul class="contact-list" id="contacts"></ul>
          </div>
        </div>
      </aside>
    </main>

    <footer class="footer">© 2025 Nebula — مشروع تجريبي شبيه بفيسبوك (محلي فقط)</footer>
  </div>

  <script>
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const storage = {
      get(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
      },
      set(key, value) { localStorage.setItem(key, JSON.stringify(value)); },
      remove(key) { localStorage.removeItem(key); }
    };

    const state = {
      me: { id: 'me', name: 'أحمد الفضلي', initials: 'أ', avatarColor: '#2563eb' },
      users: [],
      posts: [],
      theme: storage.get('theme', 'dark')
    };

    function saveAll() {
      storage.set('posts', state.posts);
      storage.set('users', state.users);
      storage.set('theme', state.theme);
    }

    function timeAgo(ts) {
      const seconds = Math.floor((Date.now() - ts) / 1000);
      const rtf = new Intl.RelativeTimeFormat('ar', { numeric: 'auto' });
      const ranges = {
        year: 3600*24*365, month: 3600*24*30, week: 3600*24*7,
        day: 3600*24, hour: 3600, minute: 60, second: 1
      };
      for (const [unit, sec] of Object.entries(ranges)) {
        const amt = Math.floor(seconds / sec);
        if (amt >= 1) return rtf.format(-amt, unit);
      }
      return 'الآن';
    }

    function uid(prefix = 'id') { return prefix + '_' + Math.random().toString(36).slice(2, 10); }

    function seedIfEmpty() {
      const seeded = storage.get('seeded_v1', false);
      if (seeded) return;
      const demoUsers = [
        { id: 'u1', name: 'سارة', initials: 'س' },
        { id: 'u2', name: 'محمد', initials: 'م' },
        { id: 'u3', name: 'ليلى', initials: 'ل' },
        { id: 'u4', name: 'خالد', initials: 'خ' },
      ];
      const demoPosts = [
        { id: uid('p'), authorId: 'u1', text: 'أول يوم في الرحلة! المناظر خلابة جدًا 🏔️', likes: ['u2','u3'], ts: Date.now()-3600*1000*2, comments: [
          { id: uid('c'), authorId: 'u2', text: 'رحلة موفقة 🙌', ts: Date.now()-3600*1000*1.5 },
        ]},
        { id: uid('p'), authorId: 'u2', text: 'شربت قهوة عربية لذيذة اليوم ☕️', likes: ['u1'], ts: Date.now()-3600*1000*5, comments: []},
      ];
      storage.set('users', demoUsers);
      storage.set('posts', demoPosts);
      storage.set('seeded_v1', true);
    }

    function load() {
      seedIfEmpty();
      state.users = storage.get('users', []);
      state.posts = storage.get('posts', []);
      state.theme = storage.get('theme', 'dark');
      $('#app').setAttribute('data-theme', state.theme);
    }

    function getUser(userId) {
      if (userId === 'me') return state.me;
      return state.users.find(u => u.id === userId) || { id: userId, name: 'مستخدم', initials: 'م' };
    }

    function renderAvatar(user, size = 36) {
      const el = document.createElement('div');
      el.className = 'avatar';
      el.style.width = el.style.height = size + 'px';
      el.style.background = `linear-gradient(135deg, ${user.avatarColor || '#334155'}, #1f2937)`;
      el.textContent = user.initials || user.name.charAt(0);
      el.title = user.name;
      return el;
    }

    function render() {
      renderStories();
      renderTrends();
      renderContacts();
      renderFeed();
      $('#composerAvatar').textContent = state.me.initials;
      $('#publishBtn').disabled = !$('#composerText').value.trim();
      $('#app').setAttribute('data-theme', state.theme);
      storage.set('theme', state.theme);
    }

    function renderStories() {
      const wrap = $('#stories');
      wrap.innerHTML = '';
      const users = [state.me, ...state.users];
      users.forEach(u => {
        const card = document.createElement('div');
        card.className = 'nav-item';
        const av = renderAvatar(u, 44);
        const name = document.createElement('div');
        name.textContent = u.name;
        card.append(av, name);
        wrap.append(card);
      });
    }

    function renderTrends() {
      const trends = [
        { tag: '#الذكاء_الاصطناعي', count: 1243 },
        { tag: '#كرة_القدم', count: 893 },
        { tag: '#تصوير', count: 642 },
        { tag: '#برمجة', count: 557 },
      ];
      const wrap = $('#trends');
      wrap.innerHTML = '';
      trends.forEach(t => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.innerHTML = `🔥 <div><div style="font-weight:800">${t.tag}</div><div class="post-time">${t.count} يتحدثون عن هذا</div></div>`;
        wrap.append(item);
      })
    }

    function renderContacts() {
      const wrap = $('#contacts');
      wrap.innerHTML = '';
      const people = [
        ...state.users,
        { id: 'u8', name: 'نورة', initials: 'ن' },
        { id: 'u9', name: 'طارق', initials: 'ط' },
      ];
      people.forEach(u => {
        const li = document.createElement('li');
        li.className = 'contact-item';
        const av = renderAvatar(u);
        const name = document.createElement('div');
        name.textContent = u.name;
        li.append(av, name);
        wrap.append(li);
      })
    }

    function makePostNode(post) {
      const user = getUser(post.authorId);
      const card = document.createElement('article');
      card.className = 'card post';

      // head
      const head = document.createElement('div');
      head.className = 'post-head';
      head.append(renderAvatar(user), Object.assign(document.createElement('div'), { innerHTML: `<div class="post-author">${user.name}</div><div class="post-time">${timeAgo(post.ts)}</div>` }));

      // content
      const content = document.createElement('div');
      content.className = 'post-content';
      content.textContent = post.text;

      // actions
      const actions = document.createElement('div');
      actions.className = 'post-actions';
      const likeBtn = document.createElement('button');
      likeBtn.className = 'pill' + (post.likes.includes('me') ? ' active' : '');
      likeBtn.innerHTML = `❤️ <span>${post.likes.length}</span>`;
      likeBtn.addEventListener('click', () => {
        const i = post.likes.indexOf('me');
        if (i === -1) post.likes.push('me'); else post.likes.splice(i, 1);
        saveAll();
        renderFeed();
      });

      const commentBtn = document.createElement('button');
      commentBtn.className = 'pill';
      const commentsCount = post.comments.length;
      commentBtn.innerHTML = `💬 <span>${commentsCount}</span>`;

      const ctaWrap = document.createElement('div');
      ctaWrap.className = 'post-cta';
      ctaWrap.append(likeBtn, commentBtn);

      const share = document.createElement('div');
      share.className = 'post-time';
      share.textContent = 'مشاركة';

      actions.append(ctaWrap, share);

      // comments
      const commentsWrap = document.createElement('div');
      commentsWrap.className = 'comment-box';

      post.comments.slice().sort((a,b)=>a.ts-b.ts).forEach(c => {
        const author = getUser(c.authorId);
        const co = document.createElement('div');
        co.className = 'comment';
        const meta = document.createElement('div');
        meta.className = 'meta';
        const authorEl = document.createElement('div');
        authorEl.className = 'author';
        authorEl.textContent = author.name;
        const timeEl = document.createElement('div');
        timeEl.className = 'time';
        timeEl.textContent = timeAgo(c.ts);
        meta.append(authorEl, timeEl);
        const text = document.createElement('div');
        text.textContent = c.text;
        co.append(meta, text);
        commentsWrap.append(co);
      });

      const addCommentRow = document.createElement('div');
      addCommentRow.className = 'row';
      const input = document.createElement('input');
      input.placeholder = 'اكتب تعليقًا...';
      Object.assign(input.style, { flex: 1, padding: '10px', borderRadius: '10px', border: '1px solid var(--border)', background: 'var(--bg-elev)', color: 'var(--text)' });
      const addBtn = document.createElement('button');
      addBtn.className = 'pill';
      addBtn.textContent = 'إرسال';
      addBtn.addEventListener('click', () => {
        const txt = input.value.trim();
        if (!txt) return;
        post.comments.push({ id: uid('c'), authorId: 'me', text: txt, ts: Date.now() });
        input.value = '';
        saveAll();
        renderFeed();
      });
      addCommentRow.append(input, addBtn);

      card.append(head, content, actions, commentsWrap, addCommentRow);
      return card;
    }

    function renderFeed() {
      const feed = $('#feed');
      const empty = $('#emptyFeed');
      feed.innerHTML = '';
      const query = $('#searchInput').value.trim();
      let posts = state.posts.slice().sort((a,b)=>b.ts-a.ts);
      if (query) {
        const q = query.toLowerCase();
        posts = posts.filter(p => p.text.toLowerCase().includes(q) || getUser(p.authorId).name.toLowerCase().includes(q));
      }
      if (posts.length === 0) {
        empty.hidden = false; return;
      } else { empty.hidden = true; }

      posts.forEach(p => feed.append(makePostNode(p)));
    }

    function wireEvents() {
      $('#composerText').addEventListener('input', () => render());
      $('#publishBtn').addEventListener('click', () => {
        const txt = $('#composerText').value.trim();
        if (!txt) return;
        const post = { id: uid('p'), authorId: 'me', text: txt, ts: Date.now(), likes: [], comments: [] };
        state.posts.push(post);
        $('#composerText').value = '';
        saveAll();
        render();
      });
      $('#themeBtn').addEventListener('click', () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        render();
      });
      $('#resetBtn').addEventListener('click', () => {
        if (!confirm('سيتم مسح البيانات المحلية وإعادة تحميل الصفحة. متابعة؟')) return;
        localStorage.clear(); location.reload();
      });
      $('#searchInput').addEventListener('input', () => renderFeed());
    }

    // init
    load();
    wireEvents();
    render();
  </script>
</body>
</html>
